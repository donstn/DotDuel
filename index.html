  <body>

    <noscript>
      <h1>DotDuel — Free Two-Player Dot Strategy Game</h1>
      <p>
        DotDuel is a free two-player strategy game playable in any
        modern browser. Place dots on a grid — when your dot completes
        a line, you score its length. The twist: when one move
        completes multiple lines at once, only the longest scores
        immediately; the rest become &ldquo;pending&rdquo; and either
        player can claim them on a later turn by tapping a colored dot
        on the line. Play continues until every dot is colored and
        every line is claimed; the player with the most points at the
        end wins.
      </p>
      <p>
        Play vs AI across five difficulty levels (Beginner through
        Impossible), or sign in for ranked multiplayer with a global
        Elo ranking, chess-style time controls (Bullet 1 min / Blitz
        3 min / Rapid 5 min), and match history. Available board
        shapes: Triangle (36 dots), Square (49 dots), Rectangle (63
        dots). No install, no fee, no third-party trackers without
        consent.
      </p>
      <p>
        DotDuel is a fresh take on classic pen-and-paper games like
        Dots and Boxes — designed for quick mobile sessions on the
        commute or longer thinking matches with a friend.
        <strong>JavaScript must be enabled to play.</strong>
      </p>
    </noscript>
