      <stop offset="100%" stop-color="#02090b"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b9d6c4"/>
    </linearGradient>
    <radialGradient id="p1Dot" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#9af0b8"/><stop offset="55%" stop-color="#62cf90"/><stop offset="100%" stop-color="#0d4a23"/>
