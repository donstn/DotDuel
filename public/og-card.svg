<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#15291e"/>
      <stop offset="60%" stop-color="#0a1a12"/>
      <stop offset="100%" stop-color="#02090b"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b9d6c4"/>
    </linearGradient>
    <radialGradient id="p1Dot" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#9af0b8"/>
      <stop offset="55%" stop-color="#62cf90"/>
      <stop offset="100%" stop-color="#0d4a23"/>
    </radialGradient>
    <radialGradient id="p2Dot" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f0fbcf"/>
      <stop offset="100%" stop-color="#92a872"/>
    </radialGradient>
    <radialGradient id="emptyDot" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#2a3a30"/>
      <stop offset="100%" stop-color="#0d1812"/>
    </radialGradient>
    <filter id="dotShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.20" transform="translate(140 460)">
    <circle cx="0" cy="0" r="22" fill="url(#p1Dot)"/>
    <circle cx="70" cy="0" r="22" fill="url(#p1Dot)"/>
    <circle cx="140" cy="0" r="22" fill="url(#p2Dot)"/>
    <circle cx="210" cy="0" r="22" fill="url(#p1Dot)"/>
    <circle cx="280" cy="0" r="22" fill="url(#p2Dot)"/>
    <circle cx="350" cy="0" r="22" fill="url(#emptyDot)"/>
    <circle cx="420" cy="0" r="22" fill="url(#emptyDot)"/>
    <line x1="-22" y1="0" x2="302" y2="0" stroke="#2b8a4c" stroke-width="9" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="302" y2="0" stroke="#b8f5d3" stroke-width="3.5" stroke-linecap="round" style="mix-blend-mode:screen"/>
  </g>

  <g opacity="0.20" transform="translate(900 130)">
    <circle cx="0" cy="0" r="22" fill="url(#p2Dot)"/>
    <circle cx="0" cy="70" r="22" fill="url(#p2Dot)"/>
    <circle cx="0" cy="140" r="22" fill="url(#p2Dot)"/>
    <circle cx="0" cy="210" r="22" fill="url(#p1Dot)"/>
    <line x1="0" y1="-22" x2="0" y2="162" stroke="#c8c878" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="0" y2="162" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" style="mix-blend-mode:screen"/>
  </g>

  <g transform="translate(600 305)" filter="url(#dotShadow)">
    <g filter="url(#glow)">
      <circle cx="-310" cy="0" r="48" fill="url(#p1Dot)"/>
    </g>
    <ellipse cx="-322" cy="-14" rx="14" ry="9" fill="#ffffff" opacity="0.55"/>

    <text x="0" y="22" text-anchor="middle"
          font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
          font-weight="800" font-size="148" letter-spacing="-1"
          fill="url(#title)">DotDuel</text>

    <g filter="url(#glow)">
      <circle cx="310" cy="0" r="48" fill="url(#p2Dot)"/>
    </g>
    <ellipse cx="298" cy="-14" rx="14" ry="9" fill="#ffffff" opacity="0.75"/>
  </g>

  <text x="600" y="430" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-weight="500" font-size="34" fill="#b9d6c4" opacity="0.95">
    Two-player dot strategy. Take turns. Finish the most lines. Win.
  </text>

  <text x="600" y="555" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-weight="600" font-size="22" letter-spacing="3" fill="#7bdb95" opacity="0.9">
    WWW.DOTDUEL.COM
  </text>
</svg>
